<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>VUMC YouTube Grid</title>
  <link rel="preconnect" href="https://i.ytimg.com">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="wrap">
    <header class="header">
      <h1 class="title">Past Messages</h1>
      <div class="searchbox">
        <input id="q" type="search" placeholder="Search videos…" aria-label="Search videos">
      </div>
    </header>

    <section id="grid" class="grid" aria-live="polite"></section>

    <div class="controls">
      <button id="reload" class="btn">Refresh</button>
    </div>
  </main>

  <!-- Video Modal -->
  <div id="videoModal" class="video-modal hidden" aria-hidden="true">
    <div class="video-modal-backdrop" id="videoModalBackdrop"></div>
    <div class="video-modal-content" role="dialog" aria-modal="true" aria-label="Video player">
      <button id="videoModalClose" class="video-modal-close" aria-label="Close video">✕</button>
      <div class="video-frame-wrap">
        <iframe
          id="videoModalFrame"
          src=""
          title="YouTube video player"
          allow="autoplay; encrypted-media; picture-in-picture; clipboard-write; fullscreen"
          allowfullscreen
        ></iframe>
      </div>
    </div>
  </div>

  <script>
    window.CHANNEL_ID = "UC_svgodM3blLqWEBQ5yNjmA";
  </script>
  <script src="script.js" defer></script>
</body>
</html>
